- id: '1686557247104'
  alias: Ventilator
  description: 'An: Wenn über 26 Grad

    Aus: Wenn unter 24 Grad'
  trigger:
  - platform: numeric_state
    entity_id: sensor.temperatur_wohnzimmer
    above: 26
    id: fanOn
  - platform: numeric_state
    entity_id: sensor.temperatur_wohnzimmer
    id: fanOff
    below: 25
  condition:
  - condition: state
    entity_id: input_boolean.ventilator
    state: 'on'
  action:
  - choose:
    - conditions:
      - condition: and
        conditions:
        - condition: trigger
          id:
          - fanOn
        - condition: time
          weekday:
          - mon
          - tue
          - wed
          - thu
          - fri
          - sat
          - sun
          before: '22:00:00'
          after: 07:00:00
          enabled: false
      sequence:
      - service: fan.turn_on
        data:
          percentage: 60
        target:
          entity_id: fan.ventilator
    - conditions:
      - condition: trigger
        id:
        - fanOff
      sequence:
      - service: fan.turn_off
