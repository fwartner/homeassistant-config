o365:
  accounts:
    - account_name: cloud37
      client_id: !secret office_365_id
      client_secret: !secret office_365_secret
      alt_auth_method: True
      enable_update: True
      email_sensor:
        - name: inbox
          max_items: 2
          is_unread: True
          download_attachments: False
      status_sensors:
        - name: "User Teams Status"
      chat_sensors:
        - name: "User Chat"
      todo_sensors:
        enabled: False
