- id: '1700359527492'
  alias: AWTRIX Notifications
  description: ''
  trigger:
  - platform: state
    entity_id:
    - binary_sensor.mmwave_badezimmer
    to: 'on'
    id: badezimmerOn
  - platform: state
    entity_id:
    - binary_sensor.mmwave_badezimmer
    to: 'off'
    id: badezimmerOff
  - platform: state
    entity_id:
    - binary_sensor.nuki_haustur_ring_action
    to: 'on'
    id: nukiOn
  - platform: state
    entity_id:
    - binary_sensor.macbook_camera_in_use
    to: 'on'
    id: macbookCameraOn
  - platform: state
    entity_id:
    - binary_sensor.macbook_camera_in_use
    to: 'off'
    id: macbookCameraOff
    from: 'on'
  condition: []
  action:
  - choose:
    - conditions:
      - condition: trigger
        id:
        - badezimmerOn
      sequence:
      - service: mqtt.publish
        data:
          qos: '1'
          retain: false
          topic: awtrix_wohnzimmer/notify
          payload: '{   "text": "Das Badezimmer ist gerade besetzt",  "wakeup": true,   "duration":
            15, "pushIcon": true, "icon": 7100 }'
    - conditions:
      - condition: trigger
        id:
        - badezimmerOn
      sequence:
      - service: mqtt.publish
        data:
          qos: '1'
          retain: false
          topic: awtrix_wohnzimmer/notify
          payload: '{   "text": "Das Badezimmer ist wieder frei",  "wakeup": true,   "duration":
            15, "pushIcon": true,  "icon": 7100 }'
    - conditions:
      - condition: trigger
        id:
        - nukiOn
      sequence:
      - service: mqtt.publish
        data:
          qos: '1'
          retain: false
          topic: awtrix_wohnzimmer/notify
          payload: '{   "text": "Es hat geklingelt!",  "wakeup": true,   "duration":
            10, "pushIcon": true,  "icon": 54924 }'
    - conditions:
      - condition: trigger
        id:
        - macbookCameraOn
      sequence:
      - service: mqtt.publish
        data:
          qos: '1'
          retain: false
          topic: awtrix_wohnzimmer/notify
          payload: '{   "text": "Ruhe Bitte!",   "wakeup": true,  "hold": true, "pushIcon":
            true,  "icon": 38789 }'
    - conditions:
      - condition: trigger
        id:
        - macbookCameraOff
      sequence:
      - service: button.press
        data: {}
        target:
          entity_id: button.awtrix_wohnzimmer_dismiss_notification
  mode: single
