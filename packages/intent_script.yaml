intent_script:
  SetCoverWohnzimmerPosition:
    action:
      service: cover.set_cover_position
      data:
        position: "{{position}}"
      target:
        entity_id: "cover.rollos_fensterbank_wohnzimmer"
    speech:
      text: >
        {{ [
          "OK",
          "Sicher",
          "Wenn du darauf bestehst",
          "Erledigt",
          "Keine Sorge",
          "Ich kann das machen",
          "Überlass es mir",
          "Betrachten Sie es als erledigt",
          "Wie Sie möchten",
          "Auf deinen Befehl",
          "Positiv",
          "Ja, oh Verehrter",
          "Ich werde",
          "Wie du beschließt, so soll es sein",
          "Kein Problem"
        ] | random }}

