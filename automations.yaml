- id: '1700299914747'
  alias: Duschen Ankündigen
  description: ''
  trigger:
  - platform: numeric_state
    entity_id:
    - sensor.temperatur_badezimmer
    above: 22
  condition:
  - condition: state
    entity_id: input_boolean.duschen_vorbereiten
    state: 'on'
  action:
  - service: notify.alexa_media
    data:
      message: Das Badezimmer hat eine Temperatur von mindestens 22 Grad erreicht.
        Du kannst also jetzt duschen gehen.
      data:
        method: all
        type: announce
      target:
      - media_player.echo_badezimmer
      - media_player.echo_flur
      - media_player.echo_schlafzimmer
      - media_player.echo_schlafzimmer
      title: Du könntest jetzt duschen gehen
  - service: input_boolean.turn_off
    data: {}
    target:
      entity_id: input_boolean.duschen_vorbereiten
  mode: single
- id: '1700300672837'
  alias: Duschen
  description: ''
  trigger:
  - platform: state
    entity_id:
    - binary_sensor.aqara_water_badezimmer_water_leak
    from: 'off'
    to: 'on'
    id: waterBadezimmerOn
  - platform: state
    entity_id:
    - binary_sensor.aqara_water_badezimmer_water_leak
    from: 'on'
    to: 'off'
    id: waterBadezimmerOff
  - platform: state
    entity_id:
    - binary_sensor.mmwave_badezimmer
    from: 'on'
    to: 'off'
    id: mmwaveDuschenAus
  - platform: numeric_state
    entity_id:
    - sensor.luftfeuchtigkeit_badezimmer
    for:
      hours: 0
      minutes: 20
      seconds: 0
    above: 70
    id: luftfeuchtigkeitBadezimmerHoch
  condition:
  - condition: state
    entity_id: input_boolean.duschen_besetzt
    state: 'on'
  action:
  - choose:
    - conditions:
      - condition: trigger
        id:
        - waterBadezimmerOn
      sequence:
      - delay:
          hours: 0
          minutes: 0
          seconds: 10
          milliseconds: 0
      - service: media_player.volume_set
        data:
          volume_level: 0.4
        target:
          entity_id: media_player.echo_badezimmer
      - service: media_player.play_media
        target:
          entity_id: media_player.echo_badezimmer
        data:
          media_content_id: shuffle 37i9dQZF1DWSqmBTGDYngZ
          media_content_type: SPOTIFY
        metadata: {}
    - conditions:
      - condition: trigger
        id:
        - mmwaveDuschenAus
      sequence:
      - service: media_player.media_stop
        data: {}
        target:
          entity_id: media_player.echo_badezimmer
      - service: climate.set_hvac_mode
        data:
          hvac_mode: 'off'
        target:
          entity_id: climate.heizung_badezimmer
      - service: input_boolean.turn_off
        data: {}
        target:
          entity_id: input_boolean.duschen_besetzt
    - conditions:
      - condition: and
        conditions:
        - condition: trigger
          id:
          - luftfeuchtigkeitBadezimmerHoch
        - condition: state
          entity_id: binary_sensor.fenster_badezimmer
          state: 'off'
      sequence:
      - service: notify.alexa_media
        data:
          target:
          - media_player.echo_badezimmer
          - media_player.echo_flur
          - media_player.echo_schlafzimmer
          - media_player.echo_schlafzimmer
          data:
            method: all
            type: announce
          title: Lüften nicht vergessen
          message: Bitte öffne doch das Fenster im Badezimmer. Oder möchtest du ein
            kleines Feuchtbiotop Zuhause haben?
  mode: single
