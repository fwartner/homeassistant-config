# Enable Home Assistant API
api:
  encryption:
    key: "K624JpfAbeUwkcmiYGZIMxDQDEnKewM41aW8nE0pr3M="

ota:
  password: "93201db328dc811fd2805375d4ef60a7"

wifi:
  ssid: !secret wifi_ssid
