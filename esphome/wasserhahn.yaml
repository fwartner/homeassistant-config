esphome:
  name: wasserhahn
  friendly_name: wasserhahn

esp8266:
  board: d1_mini

logger:

api:
  encryption:
    key: "FQEQCFmoRW5SV+YNDWFADil7rpV5meOXc7Tj007dfi4="

ota:
  safe_mode: true
  password: !secret ota_password
  on_begin:
    then:
      - logger.log: "OTA start"
  on_progress:
    then:
      - logger.log:
          format: "OTA progress %0.1f%%"
          args: ["x"]
  on_end:
    then:
      - logger.log: "OTA end"
  on_error:
    then:
      - logger.log:
          format: "OTA update error %d"
          args: ["x"]

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  ap:
    ssid: "Wasserhahn Fallback Hotspot"
    password: "MtE2iFyO17pv"

captive_portal:
web_server:
  port: 80

switch:
  - platform: restart
    name: "ESP Restart"
  - platform: gpio
    name: "Wasserlauf"
    icon: "mdi:faucet"
    id: switch_wasserhan
    pin: 
      number: D1
      inverted: true
      mode: 
        output: true
        open_drain: true
    restore_mode: ALWAYS_OFF