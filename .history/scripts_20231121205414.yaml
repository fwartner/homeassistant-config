
3_minuten_bettzeit:
  alias: 3 Minuten Bettzeit
  sequence:
    - alias: "Starte Timer für die Bettzeit"
      service: timer.start
      data:
        duration: '00:03:00'
      target:
        entity_id: timer.3_minuten_bett

    - alias: "Schalte Bettzeitlicht ein"
      service: light.turn_on
      target:
        entity_id: light.bettzeitlicht
      data:
        brightness_pct: 30

    - alias: "Schließe Fensterrollos"
      service: cover.close_cover
      target:
        entity_id: cover.fensterrollos_schlafzimmer

    - alias: "Verzögerung"
      delay:
        seconds: 3

    - alias: "Prüfe, ob Rollos geschlossen"
      choose:
        - conditions:
            - condition: state
              entity_id: cover.fensterrollos_schlafzimmer
              state: 'closed'
          sequence:
            - alias: "Rollos geschlossen, fahre fort"
              service: script.continue_script
        - conditions:
            - condition: state
              entity_id: cover.fensterrollos_schlafzimmer
              state: 'open'
          sequence:
            - alias: "Versuche erneut, Rollos zu schließen"
              service: cover.close_cover
              target:
                entity_id: cover.fensterrollos_schlafzimmer
            - delay:
                seconds: 3
            - alias: "Informiere über Fehlschlag beim Schließen der Rollos"
              service: notify.user_notification
              data:
                message: "Die Fensterrollos konnten nicht geschlossen werden."

    - alias: "Schalte andere Lichter aus"
      service: light.turn_off
      target:
        entity_id:
          - light.anderes_licht1
          - light.anderes_licht2

    - alias: "Sperre die Tür"
      service: lock.lock
      target:
        entity_id: lock.haustuer

  mode: single
  icon: mdi:bed-clock
