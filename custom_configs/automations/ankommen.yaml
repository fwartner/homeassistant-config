- id: "1691741828322"
  alias: Ankommen
  description: ""
  trigger:
    - platform: state
      entity_id:
        - binary_sensor.aqara_contact_wohnungstur_contact
      from: "on"
      to: "off"
      enabled: true
      for:
        hours: 0
        minutes: 0
        seconds: 5
      id: doorOpenOn
    - platform: state
      entity_id:
        - sensor.people_home
      to: "1"
      id: anyoneHomeOn
  condition:
    - condition: and
      conditions:
        - condition: state
          entity_id: input_boolean.guestmode
          state: "off"
        - condition: template
          value_template:
            "{{ is_state_attr('media_player.spotify_florian', 'source',
            'iPhone') }}"
          enabled: true
        - condition: template
          value_template:
            "{{ is_state('media_player.spotify_florian', 'playing')
            }}"
          enabled: true
  action:
    - choose:
        - conditions:
            - condition: trigger
              id:
                - anyoneHomeOn
          sequence:
            - service: switch.turn_on
              data: {}
              target:
                device_id: f609651e79fe3f0345670e676f3fedf4
        - conditions:
            - condition: trigger
              id:
                - doorOpenOn
          sequence:
            - service: notify.mobile_app_florians_iphone
              data:
                title: "Willkommen Zuhause \U0001F3E0"
                message: Ich habe die Musik von deinem iPhone auf Sonos Ray gestellt
            - service: media_player.select_source
              data:
                source: Spotify Connect
              target:
                entity_id: media_player.sonos_ray
            - service: media_player.select_source
              data:
                source: Sonos Ray
              target:
                entity_id: media_player.spotify_florian
            - service: media_player.media_play
              data: {}
              target:
                entity_id: media_player.sonos_ray
  mode: single
