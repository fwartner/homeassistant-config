    state: 'on'
  action:
  - choose:
    - conditions:
      - condition: and
        conditions:
        - condition: trigger
          id:
          - fanOn
        - condition: time
          weekday:
          - mon
          - tue
          - wed
          - thu
          - fri
          - sat
          - sun
          before: '22:00:00'
          after: 07:00:00
          enabled: false
      sequence:
      - service: fan.turn_on
        data:
          percentage: 60
        target:
          entity_id: fan.ventilator
    - conditions:
      - condition: trigger
        id:
