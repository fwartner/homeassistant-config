esphome:
  name: esp-display-test
  friendly_name: esp-display-test

esp32:
  board: esp32-c3-devkitm-1
  framework:
    type: esp-idf
    version: recommended
    # Custom sdkconfig options
    sdkconfig_options:
      COMPILER_OPTIMIZATION_SIZE: y
    # Advanced tweaking options
    advanced:
      ignore_efuse_mac_crc: false

external_components:
  - source: github://pr#3625
    components: [ gc9a01 ]

# Enable logging
logger:

# Enable Home Assistant API
api:
  encryption:
    key: "0u1tdxWDByxXCWuDTwiSV+/ogZATO37LvUNyFZ1RhrQ="

ota:
  password: "ec09054870686b8f95635bbdf3a18a4a"

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Esp-Display-Test"
    password: "nugjz0MUNNRL"

captive_portal:

spi:
  mosi_pin: GPIO32
  clk_pin: GPIO27

display:
- platform: gc9a01
  reset_pin: GPIO26
  cs_pin: GPIO25
  dc_pin: GPIO33
  rotation: 180
  lambda: |-
    it.print(0, 120, id(font), "Hello World!");