- id: '1676121630166'
  alias: Jonas
  description: Erkennung Büro, Spielzeit, Schlafenszeit, Musik
  trigger:
  - type: motion
    platform: device
    device_id: 618fef42fa8e6efc59445fc6314ada4b
    entity_id: 105a3f210a0d1dd818f80a2e1c8987a2
    domain: binary_sensor
    id: jonasMotionOn
  - platform: time
    at: '18:30:00'
    id: jonasCleanTeethOn
  - platform: state
    entity_id:
    - input_boolean.jonas_ist_da
    from: 'off'
    to: 'on'
    id: jonasHereOn
    alias: Jonas ist da
  - platform: state
    entity_id:
    - input_boolean.jonas_ist_da
    from: 'on'
    to: 'off'
    id: jonasHereOff
    alias: Jonas ist nicht mehr da
  - platform: state
    entity_id:
    - timer.zahneputzen
    to: active
    id: jonasCleanToothTimerOn
    alias: Zähneputzen beginnt
  - platform: state
    entity_id:
    - timer.zahneputzen
    to: idle
    id: jonasCleanToothTimerOff
    alias: Zähneputzen endet
  - platform: calendar
    event: start
    offset: 0:0:0
    entity_id: calendar.jonas
    id: jonasCalendaOn
    alias: Papawochenende beginnt
  - platform: calendar
    event: end
    offset: 0:0:0
    entity_id: calendar.jonas
    id: jonasCalendaOff
    alias: Papawochenende endet
  condition: []
  action:
  - choose:
    - conditions:
      - condition: and
        conditions:
        - condition: trigger
          id:
          - jonasMotionOn
        - condition: state
          entity_id: input_boolean.jonas_ist_da
          state: 'on'
      sequence:
      - service: notify.alexa_media_florians_echo_show_8_2nd_gen
        data:
          message: Jonas ist im Büro
    - conditions:
      - condition: and
        conditions:
        - condition: state
          entity_id: input_boolean.jonas_ist_da
          state: 'on'
        - condition: trigger
          id:
          - jonasCleanTeethOn
        - condition: state
          entity_id: sensor.people_home
          state: '1'
      sequence:
      - type: turn_off
        device_id: d60428083cf2206a189453343e1e4bb1
        entity_id: 0803f2de7bc30e5001fc4688fcfd0185
        domain: remote
      - service: notify.alexa_media_echo_show_wohnzimmer
        data:
          message: ' Lieber Jonas.. Es wird Zeit, ins Bett zu gehen. Bitte geh ins
            Badezimmer und     putz deine Zähne, zieh dir deinen Schlafanzug an und
            leg dich schonmal ins     Bett.'
    - conditions:
      - condition: trigger
        id:
        - jonasHereOn
      sequence:
      - service: roborock.vacuum_clean_segment
        data:
          segments:
          - '16'
          - '18'
        target:
          entity_id: vacuum.roborock_s7_maxv
    - conditions:
      - condition: trigger
        id:
        - jonasHereOff
      sequence:
      - service: roborock.vacuum_clean_segment
        data:
          segments:
          - '16'
          - '18'
        target:
          entity_id: vacuum.roborock_s7_maxv
    - conditions:
      - condition: trigger
        id:
        - jonasCleanToothTimerOn
      sequence:
      - service: notify.alexa_media_florians_4_echo_dot
        data:
          message: Und los gehts! Putz deine Zähne schön gründlich. Ich sage dir Bescheid,
            wenn du fertig bist.
    - conditions:
      - condition: trigger
        id:
        - jonasCleanToothTimerOff
      sequence:
      - service: notify.alexa_media_florians_4_echo_dot
        data:
          message: Super! Du kannst die Zahnbürste jetzt saubermachen und dich ins
            Bett legen. Schlaf gut!
    - conditions:
      - condition: and
        conditions:
        - condition: trigger
          id:
          - jonasCalendaOn
        - condition: template
          value_template: '{{ is_state_attr(''calendar.jonas'', ''message'', ''Papawochenende'')
            }}'
      sequence:
      - service: input_boolean.turn_on
        data: {}
        target:
          entity_id: input_boolean.jonas_ist_da
    - conditions:
      - condition: and
        conditions:
        - condition: trigger
          id:
          - jonasCalendaOff
        - condition: template
          value_template: '{{ is_state_attr(''calendar.jonas'', ''message'', ''Papawochenende'')
            }}'
      sequence:
      - service: input_boolean.turn_off
        data: {}
        target:
          entity_id: input_boolean.jonas_ist_da
    - conditions:
      - condition: trigger
        id:
        - jonasCalendaOn
      sequence:
      - service: shopping_list.add_item
        data:
          name: Kekse
      - service: shopping_list.add_item
        data:
          name: Erdbeermilch
      - service: shopping_list.add_item
        data:
          name: Käse
      - service: shopping_list.add_item
        data:
          name: Käse
      - service: shopping_list.add_item
        data:
          name: Toastbrot
  mode: single
