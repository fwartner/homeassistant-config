- id: '1700167188286'
  alias: Luftreiniger
  description: ''
  trigger:
  - platform: zone
    entity_id: person.florian
    zone: zone.home
    event: leave
    id: zoneLeavePure
    alias: Luftreiniger nach Zone Trigger
  - platform: time
    at: '20:30:00'
    alias: Luftreiniger Schlafzimmer Abends
    id: timeEveningPure
  condition: []
  action:
  - choose:
    - conditions:
      - condition: and
        conditions:
        - condition: trigger
          id:
          - zoneLeavePure
        - condition: state
          entity_id: sensor.people_home
          state: '0'
          for:
            hours: 0
            minutes: 5
            seconds: 0
      sequence:
      - service: climate.set_fan_mode
        data:
          fan_mode: high
        target:
          entity_id:
          - climate.luftreiniger_schlafzimmer
      - delay:
          hours: 0
          minutes: 10
          seconds: 0
          milliseconds: 0
      - service: climate.set_fan_mode
        data:
          fan_mode: low
        target:
          entity_id:
          - climate.luftreiniger_schlafzimmer
      alias: Luftreiniger nach Zone
    - conditions:
      - condition: trigger
        id:
        - timeEveningPure
      sequence:
      - service: climate.set_fan_mode
        data:
          fan_mode: high
        target:
          entity_id:
          - climate.luftreiniger_schlafzimmer
      - delay:
          hours: 0
          minutes: 10
          seconds: 0
          milliseconds: 0
      - service: climate.set_fan_mode
        data:
          fan_mode: low
        target:
          entity_id:
          - climate.luftreiniger_schlafzimmer
  mode: single
- id: '1700175805163'
  alias: Movietime
  description: ''
  trigger:
  - type: not_occupied
    platform: device
    device_id: d116b4e815a7a6a1a9ef5b5964b4fa60
    entity_id: 9005bd83b2298d3a3a7ba3ad53c26103
    domain: binary_sensor
    id: couchFrei
  - type: occupied
    platform: device
    device_id: d116b4e815a7a6a1a9ef5b5964b4fa60
    entity_id: 9005bd83b2298d3a3a7ba3ad53c26103
    domain: binary_sensor
    id: couchBelegt
  - platform: state
    entity_id:
    - input_boolean.movietime
    from: 'off'
    to: 'on'
    id: movietimeOn
  - platform: state
    entity_id:
    - input_boolean.movietime
    from: 'on'
    to: 'off'
    id: movietimeOff
  condition: []
  action:
  - choose:
    - conditions:
      - condition: and
        conditions:
        - condition: state
          entity_id: input_boolean.movietime
          state: 'on'
        - condition: trigger
          id:
          - couchFrei
      sequence:
      - if:
        - condition: state
          entity_id: media_player.apple_tv_wohnzimmer
          state: playing
        then:
        - service: media_player.media_pause
          data: {}
          target:
            device_id: d60428083cf2206a189453343e1e4bb1
    - conditions:
      - condition: and
        conditions:
        - condition: state
          entity_id: input_boolean.movietime
          state: 'on'
        - condition: trigger
          id:
          - couchBelegt
      sequence:
      - if:
        - condition: state
          entity_id: media_player.apple_tv_wohnzimmer
          state: paused
        then:
        - service: media_player.media_play
          data: {}
          target:
            device_id: d60428083cf2206a189453343e1e4bb1
    - conditions:
      - condition: trigger
        id:
        - movietimeOn
      sequence:
      - type: turn_on
        device_id: 8eaacb8197a2635277b701aac082f0c7
        entity_id: 255a28db87beeaea88f4a5fc89b6b772
        domain: switch
    - conditions:
      - condition: trigger
        id:
        - movietimeOff
      sequence:
      - type: turn_off
        device_id: 8eaacb8197a2635277b701aac082f0c7
        entity_id: 255a28db87beeaea88f4a5fc89b6b772
        domain: switch
  mode: single
