- id: '1666541360265'
  alias: Wecker
  description: ''
  trigger:
  - platform: template
    value_template: "{{ states.sensor.time.state + \n':00' == states.input_datetime.wecker.state
      }}"
  condition:
  - condition: state
    entity_id: input_boolean.wecker_schalter
    state: 'on'
  action:
  - parallel:
    - service: cover.open_cover
      data: {}
      target:
        entity_id: cover.rollos_fensterbank_schlafzimmer
  - repeat:
      until:
      - condition: state
        entity_id: input_boolean.wecker_schalter
        state: 'off'
      sequence:
      - service: media_player.play_media
        target:
          entity_id: media_player.hp_schlafzimmer
        data:
          media_content_id: media-source://media_source/local/mixkit-short-rooster-crowing-2470
            (online-audio-converter.com).mp3
          media_content_type: audio/mpeg
        metadata:
          title: mixkit-short-rooster-crowing-2470 (online-audio-converter.com).mp3
          thumbnail:
          media_class: music
          children_media_class:
          navigateIds:
          - {}
          - media_content_type: app
            media_content_id: media-source://media_source
      - delay:
          hours: 0
          minutes: 0
          seconds: 5
          milliseconds: 0
    enabled: false
  - service: input_boolean.turn_off
    data: {}
    target:
      entity_id: input_boolean.wecker_schalter
  mode: single
