esphome:
  name: pflanzen-test
  friendly_name: pflanzen-test
  platformio_options:
    board_build.f_cpu: 160000000L

esp8266:
  board: d1_mini

# Enable logging
logger:

# Enable Home Assistant API
api:
  encryption:
    key: "3klLY464zCBAEk2bqSh6+O9O9OYJJXzAU9/uUKWTvBk="

ota:
  password: "176df1b67f65434f6c8a462fc097f5d9"

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Pflanzen-Test Fallback Hotspot"
    password: "QhSliEIkIL5x"

captive_portal:

web_server:
    port: 80

light:
  - platform: binary
    name: "Blue Light"
    output: light_output
    id: led_light
    restore_mode: ALWAYS_OFF

output:
  - platform: gpio
    pin: GPIO2
    id: light_output
    inverted: true

sensor:
- platform: adc
  pin: A0
  id: "adcMoisture"
  accuracy_decimals: 5
  unit_of_measurement: '%'
  filters:
    - calibrate_linear:
      - 0.32324  -> 100.0
      - 0.69336 -> 0
  name: "Plant - Moisture Level"
  update_interval: 30s
- platform: adc
  pin: A0
  id: "adcRaw_Sensor_Data"
  accuracy_decimals: 5
  name: "Plant - Sensor Voltage"
  update_interval: 30s
- platform: wifi_signal
  name: "Plant - WiFi Signal Sensor"
  update_interval: 30s