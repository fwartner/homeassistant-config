intent_script:
  OpenCoverBalkonWohnzimmerIntent:
    action:
      service: cover.open_cover
      target:
        entity_id: cover.ikea_rollo_balkontur_wohnzimmer
    speech:
      type: plain
      ext: >
        {{ [
          "In Ordnung"
          "Sicher"
          "Wenn du darauf bestehst"
          "Erledigt"
          "Keine Sorge"
          "Ich kann das tun"
          "Überlass es mir"
          "Betrachte es als erledigt"
          "Wie du wünschst"
          "Nach deinem Befehl"
          "Ich werde"
          "Wie du befielst, so sei es"
          "Kein Problem"
        ] | random }}

